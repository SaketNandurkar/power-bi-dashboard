<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Apothecon Logo - Medical cross with DNA helix -->
  <defs>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dnaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB300;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB300;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Medical cross / flower shape -->
  <g transform="translate(10, 5)">
    <!-- Cross petals -->
    <path d="M30 8 C30 3, 35 0, 40 0 C45 0, 50 3, 50 8 L50 22 L30 22 Z" fill="url(#crossGrad)" opacity="0.9"/>
    <path d="M30 48 C30 53, 35 56, 40 56 C45 56, 50 53, 50 48 L50 34 L30 34 Z" fill="url(#crossGrad)" opacity="0.9"/>
    <path d="M8 22 C3 22, 0 27, 0 32 C0 37, 3 42, 8 42 L22 42 L22 22 Z" fill="url(#crossGrad)" opacity="0.85"/>
    <path d="M58 22 C63 22, 66 27, 66 32 C66 37, 63 42, 58 42 L44 42 L44 22 Z" fill="url(#crossGrad)" opacity="0.85"/>

    <!-- Center circle -->
    <circle cx="33" cy="28" r="12" fill="url(#crossGrad)" opacity="0.95"/>

    <!-- Corner petals (flower effect) -->
    <path d="M22 14 Q26 10, 30 14 Q26 18, 22 14Z" fill="url(#crossGrad)" opacity="0.7"/>
    <path d="M50 14 Q54 10, 58 14 Q54 18, 50 14Z" fill="url(#crossGrad)" opacity="0.7"/>
    <path d="M22 42 Q26 38, 30 42 Q26 46, 22 42Z" fill="url(#crossGrad)" opacity="0.7"/>
    <path d="M50 42 Q54 38, 58 42 Q54 46, 50 42Z" fill="url(#crossGrad)" opacity="0.7"/>

    <!-- DNA Helix -->
    <path d="M28 16 C32 20, 38 20, 38 24 C38 28, 28 28, 28 32 C28 36, 38 36, 38 40"
          stroke="#FFB300" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M38 16 C34 20, 28 20, 28 24 C28 28, 38 28, 38 32 C38 36, 28 36, 28 40"
          stroke="#FFB300" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- DNA rungs -->
    <line x1="29" y1="20" x2="37" y2="20" stroke="#FFB300" stroke-width="1.5" opacity="0.7"/>
    <line x1="29" y1="28" x2="37" y2="28" stroke="#FFB300" stroke-width="1.5" opacity="0.7"/>
    <line x1="29" y1="36" x2="37" y2="36" stroke="#FFB300" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Apothecon Text -->
  <text x="88" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#0097A7" letter-spacing="-0.5">
    Apothecon
  </text>

  <!-- Tagline -->
  <text x="90" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-style="italic" fill="#0097A7" letter-spacing="0.5">
    Caring For Humanity...
  </text>
</svg>